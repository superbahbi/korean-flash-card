<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>고요 — Korean Practice</title>
<style>
  :root{
    --bg:#1B2330;
    --bg-soft:#232C3D;
    --paper:#F3EEE3;
    --paper-edge:#E7E0D1;
    --ink:#2A2620;
    --ink-soft:#7A7263;
    --red:#B5432F;
    --jade:#4F7568;
    --gold:#C9A227;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:radial-gradient(circle at 50% -10%, #2A3447 0%, var(--bg) 55%, #141A24 100%);
    color:var(--paper);
    font-family:-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
  }
  #app{
    display:flex;
    flex-direction:column;
    min-height:100vh;
    max-width:480px;
    width:100%;
    margin:0 auto;
    padding:env(safe-area-inset-top,0px) 18px env(safe-area-inset-bottom,0px) 18px;
  }
  header{padding:22px 0 10px;}
  .title{
    font-family:Georgia,"Source Serif 4",serif;
    font-size:28px;
    letter-spacing:0.5px;
    margin:0;
    color:var(--paper);
  }
  .subtitle{
    margin:2px 0 16px;
    font-size:13px;
    color:#9aa3b5;
    letter-spacing:0.3px;
  }
  .stats-row{
    display:flex;
    gap:14px;
    font-size:12.5px;
    color:#b9c0cf;
    margin-bottom:14px;
  }
  .stats-row b{color:var(--gold); font-weight:600;}
  .tags{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:8px;
  }
  .tag-chip{
    border:1px solid #3a4458;
    background:transparent;
    color:#9aa3b5;
    font-size:12px;
    letter-spacing:0.3px;
    padding:6px 12px;
    border-radius:14px;
    cursor:pointer;
    transition:all .2s ease;
    font-family:inherit;
  }
  .tag-chip.active{
    background:var(--jade);
    border-color:var(--jade);
    color:#EAF0EC;
  }
  .browse-link{
    font-size:12px;
    color:var(--gold);
    text-decoration:underline;
    cursor:pointer;
    margin-bottom:2px;
    display:inline-block;
  }
  main{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px 0;
    position:relative;
  }
  .stage{
    width:100%;
    max-width:340px;
    aspect-ratio:3/4;
    perspective:1400px;
  }
  .card{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform .55s cubic-bezier(.4,.2,.2,1);
    cursor:pointer;
  }
  .card.flipped{ transform:rotateY(180deg); }
  .face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    border-radius:7px;
    background:var(--paper);
    border:1px solid var(--paper-edge);
    box-shadow:0 18px 40px -12px rgba(0,0,0,.55), 0 2px 6px rgba(0,0,0,.25);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:30px 22px;
    text-align:center;
  }
  .face.back{ transform:rotateY(180deg); }
  .face .eyebrow{
    position:absolute;
    top:16px;
    left:18px;
    font-size:10.5px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  .face .word{
    color:var(--ink);
    font-size:23px;
    line-height:1.45;
    font-weight:600;
  }
  .face.back .word{ font-size:18px; font-weight:500; line-height:1.5;}
  .enso{
    position:absolute;
    bottom:14px;
    right:14px;
    width:44px;
    height:44px;
    opacity:.55;
  }
  .enso path{
    fill:none;
    stroke:var(--red);
    stroke-width:5;
    stroke-linecap:round;
    stroke-dasharray:230;
    stroke-dashoffset:230;
    transition:stroke-dashoffset .9s ease;
  }
  .card.flipped .enso path{ stroke-dashoffset:0; }
  .tap-hint{
    margin-top:16px;
    text-align:center;
    font-size:12px;
    color:#7c869c;
    letter-spacing:.3px;
    min-height:16px;
  }
  footer{
    padding:6px 0 18px;
    min-height:78px;
  }
  .grade-row{
    display:flex;
    gap:10px;
  }
  .grade-btn{
    flex:1;
    border:none;
    border-radius:9px;
    padding:15px 0;
    font-size:14px;
    font-weight:600;
    letter-spacing:.3px;
    color:#fff;
    font-family:inherit;
    cursor:pointer;
    transition:transform .15s ease, filter .15s ease;
  }
  .grade-btn:active{ transform:scale(.96); }
  .grade-btn.again{ background:var(--red); }
  .grade-btn.good{ background:var(--jade); }
  .grade-btn.easy{ background:var(--gold); color:#2A2620; }
  .empty-state, .done-state{
    text-align:center;
    padding:0 12px;
  }
  .empty-state .glyph, .done-state .glyph{
    font-family:Georgia,serif;
    font-size:15px;
    color:#9aa3b5;
    margin-bottom:10px;
    letter-spacing:.3px;
  }
  .empty-state .big, .done-state .big{
    font-family:Georgia,"Source Serif 4",serif;
    font-size:21px;
    color:var(--paper);
    margin-bottom:8px;
  }
  .empty-state p, .done-state p{
    color:#9aa3b5;
    font-size:13px;
    line-height:1.6;
    margin:0;
  }
  .more-link{
    display:inline-block;
    margin-top:16px;
    font-size:12.5px;
    color:var(--gold);
    text-decoration:underline;
    cursor:pointer;
  }
  .progress-footer{
    text-align:center;
    font-size:11.5px;
    color:#65708a;
    padding-bottom:4px;
  }
  .kbd-hint{
    text-align:center;
    font-size:10.5px;
    color:#4d5872;
    padding-bottom:2px;
  }
  .link-row{
    margin-bottom:2px;
  }
  .link-row .browse-link{ margin-right:14px; }
  .reset-link{
    font-size:12px;
    color:#9aa3b5;
    text-decoration:underline;
    cursor:pointer;
  }
  .reset-link.armed{ color:var(--red); }
  .save-indicator{
    text-align:center;
    font-size:11px;
    color:var(--red);
    min-height:14px;
    padding-bottom:2px;
  }
  #browseView{
    display:none;
    flex:1;
    width:100%;
    overflow-y:auto;
    padding:4px 0 18px;
  }
  .browse-back-link{
    font-size:12px;
    color:var(--gold);
    text-decoration:underline;
    cursor:pointer;
    margin-bottom:14px;
    display:inline-block;
  }
  .browse-group-title{
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--jade);
    margin:18px 0 8px;
  }
  .browse-row{
    border-bottom:1px solid #2c3650;
    padding:10px 0;
  }
  .browse-line{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .browse-front{
    font-size:14.5px;
    color:var(--paper);
    margin-bottom:3px;
  }
  .browse-back{
    font-size:12.5px;
    color:#9aa3b5;
  }
  .copy-btn{
    border:1px solid #3a4458;
    background:rgba(255,255,255,.04);
    color:var(--paper);
    border-radius:7px;
    font-size:13px;
    line-height:1;
    padding:5px 8px;
    cursor:pointer;
    flex-shrink:0;
    transition:background .15s ease, color .15s ease;
  }
  a.copy-btn{ text-decoration:none; display:inline-block; }
  .copy-btn.small{
    font-size:12px;
    padding:4px 7px;
  }
  .copy-btn.copied{
    background:var(--jade);
    border-color:var(--jade);
    color:#fff;
  }
  .face-actions{
    position:absolute;
    bottom:14px;
    left:14px;
    display:flex;
    gap:8px;
  }
  .copy-btn.on-face{
    border:1px solid var(--paper-edge);
    background:rgba(255,255,255,.5);
    color:var(--ink);
  }
  .copy-btn.on-face.copied{
    background:var(--jade);
    color:#fff;
    border-color:var(--jade);
  }
  .copy-btn.on-face.active{
    background:var(--gold);
    color:#2A2620;
    border-color:var(--gold);
  }
  .roman-text{
    margin-top:8px;
    font-size:13px;
    color:var(--ink-soft);
    display:none;
    letter-spacing:.2px;
  }
  .roman-text.visible{ display:block; }
  .row-actions{
    display:flex;
    gap:6px;
    flex-shrink:0;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1 class="title">고요</h1>
    <div class="subtitle">stillness · daily Korean practice</div>
    <div class="stats-row" id="statsRow"></div>
    <div class="tags" id="tagRow"></div>
    <div class="link-row">
      <span class="browse-link" id="browseLink">browse full deck →</span>
      <span class="reset-link" id="resetLink">reset progress</span>
    </div>
  </header>

  <main id="mainArea">
    <div id="stage" class="stage" style="display:none;">
      <div class="card" id="card">
        <div class="face front">
          <span class="eyebrow" id="frontTag"></span>
          <div class="word" id="frontWord"></div>
          <div class="roman-text" id="frontRoman"></div>
          <div class="face-actions">
            <button class="copy-btn on-face" id="copyBtn" aria-label="copy Korean text">⧉</button>
            <a class="copy-btn on-face" id="papagoLink" target="_blank" rel="noopener noreferrer" href="#" aria-label="Open in Papago translator">🌐</a>
            <button class="copy-btn on-face" id="romanToggle" aria-pressed="false" aria-label="show or hide romanization">Aa</button>
          </div>
          <svg class="enso" viewBox="0 0 50 50"><path d="M25,4 A21,21 0 1 1 8,38"/></svg>
        </div>
        <div class="face back">
          <span class="eyebrow">meaning</span>
          <div class="word" id="backWord"></div>
        </div>
      </div>
    </div>
    <div id="emptyState" class="empty-state" style="display:none;">
      <div class="glyph">— 一 —</div>
      <div class="big">All caught up</div>
      <p id="emptyMsg"></p>
    </div>
    <div id="doneState" class="done-state" style="display:none;">
      <div class="glyph">— 一 —</div>
      <div class="big">오늘은 여기까지</div>
      <p id="doneMsg"></p>
      <span class="more-link" id="moreLink">study a few more anyway</span>
    </div>
  </main>

  <div id="browseView"></div>

  <div class="tap-hint" id="tapHint"></div>

  <footer>
    <div class="grade-row" id="gradeRow" style="visibility:hidden;">
      <button class="grade-btn again" data-grade="again">Again</button>
      <button class="grade-btn good" data-grade="good">Good</button>
      <button class="grade-btn easy" data-grade="easy">Easy</button>
    </div>
  </footer>
  <div class="progress-footer" id="progressFooter"></div>
  <div class="save-indicator" id="saveIndicator"></div>
  <div class="kbd-hint" id="kbdHint"></div>
</div>

<script>
const CARDS_RAW = [

["N + 이 있어요 / 없어요","there is/isn't N; I have/don't have N","grammar"],

["V + 지 마세요","Please don't V","grammar"],
["만나서 반가워요 (mannaseo bangawoyo)","Nice to meet you","daily"],
["또 만나요 (tto mannayo)","See you again","daily"],
["잘 지내요? (jal jinaeyo?)","How are you doing?","daily"],
["잘 지내요 (jal jinaeyo)","I'm doing well","daily"],
["이름이 뭐예요? (ireumi mwoyeyo?)","What's your name?","daily"],
["어디에서 왔어요? (eodieseo wasseoyo?)","Where are you from?","daily"],
["미국에서 왔어요 (migugeseo wasseoyo)","I'm from the US","daily"],

["혼자 여행해요 (honja yeohaenghaeyo)","I'm traveling alone","daily"],

const CARDS = CARDS_RAW.map((c,i)=>({id:String(i), front:c[0], back:c[1], tag:c[2]}));

const TAGS = ["survival","numbers","daily","temple","grammar"];
const INTERVALS = [1,2,4,7,14,30,60];
const NEW_CARD_CAP = 10;
// Bump this number any time you ship a change that should force everyone's
// saved progress to reset (new card set, changed scoring, etc). Changing it
// makes window.storage look for a key that doesn't exist yet, so it falls
// back to defaultState() automatically — no manual wipe needed.
const DECK_VERSION = 2;
const STORAGE_KEY = `korean-deck-progress-v${DECK_VERSION}`;

let state = null;
let queue = [];
let qIndex = 0;
let flipped = false;
let sessionExtra = false;
let resetArmed = false;
let resetTimer = null;

function todayStr(){ return new Date().toISOString().slice(0,10); }
function addDays(dateStr, n){
  const d = new Date(dateStr+"T00:00:00");
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}

function extractKorean(frontStr){
  const idx = frontStr.indexOf(" (");
  return idx >= 0 ? frontStr.slice(0, idx).trim() : frontStr.trim();
}

function extractRoman(frontStr){
  const m = frontStr.match(/\(([^)]*)\)/);
  return m ? m[1] : null;
}

function flashCopied(btnEl){
  if(!btnEl) return;
  const original = btnEl.textContent;
  btnEl.textContent = "✓";
  btnEl.classList.add("copied");
  setTimeout(()=>{
    btnEl.textContent = original;
    btnEl.classList.remove("copied");
  }, 1100);
}

async function copyText(text, btnEl){
  try{
    if(!navigator.clipboard || !navigator.clipboard.writeText) throw new Error("no clipboard api");
    await navigator.clipboard.writeText(text);
    flashCopied(btnEl);
  }catch(e){
    try{
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      flashCopied(btnEl);
    }catch(e2){
      console.warn("copy failed", e2);
    }
  }
}

// Storage backend detection: window.storage only exists inside Claude's
// artifact environment. When this file is opened standalone (AirDrop, email,
// self-hosted, etc.) it won't exist, so we fall back to the browser's own
// localStorage, and finally to plain memory if even that's blocked
// (e.g. some browsers restrict localStorage on file:// pages).
const hasClaudeStorage = !!(window.storage && typeof window.storage.set === "function");
let memoryFallback = {};
let usingMemoryOnly = false;

function localStorageWorks(){
  try{
    localStorage.setItem("__test__","1");
    localStorage.removeItem("__test__");
    return true;
  }catch(e){
    return false;
  }
}

async function storageGet(key){
  if(hasClaudeStorage){
    try{
      const res = await window.storage.get(key, false);
      return res ? res.value : null;
    }catch(e){ return null; }
  }
  if(!usingMemoryOnly && localStorageWorks()){
    try{ return localStorage.getItem(key); }catch(e){ return null; }
  }
  usingMemoryOnly = true;
  return memoryFallback[key] ?? null;
}

async function storageSet(key, value){
  if(hasClaudeStorage){
    try{ await window.storage.set(key, value, false); return true; }
    catch(e){ return false; }
  }
  if(!usingMemoryOnly && localStorageWorks()){
    try{ localStorage.setItem(key, value); return true; }
    catch(e){ /* fall through to memory */ }
  }
  usingMemoryOnly = true;
  memoryFallback[key] = value;
  return false;
}

async function storageDelete(key){
  if(hasClaudeStorage){
    try{ await window.storage.delete(key, false); }catch(e){}
    return;
  }
  try{ localStorage.removeItem(key); }catch(e){}
  delete memoryFallback[key];
}

function defaultState(){
  return {
    cardStates: {},
    dailyNew: { date: todayStr(), count: 0 },
    activeTags: ["survival","numbers","daily"]
  };
}

async function loadState(){
  try{
    const raw = await storageGet(STORAGE_KEY);
    state = raw ? JSON.parse(raw) : defaultState();
  }catch(e){
    state = defaultState();
  }
  if(state.dailyNew.date !== todayStr()){
    state.dailyNew = { date: todayStr(), count: 0 };
  }
  await saveState();
}

async function saveState(){
  for(let attempt=0; attempt<2; attempt++){
    const ok = await storageSet(STORAGE_KEY, JSON.stringify(state));
    if(ok){ setSaveIndicator(true); return true; }
    if(attempt===0){ await new Promise(r=>setTimeout(r,400)); continue; }
  }
  if(usingMemoryOnly){
    setSaveIndicator(false, "progress is only saved for this browser tab — open this file the same way each time, or use it inside Claude, to keep history between visits");
  } else {
    setSaveIndicator(false);
  }
  return false;
}

function setSaveIndicator(ok, customMsg){
  const el = document.getElementById("saveIndicator");
  if(!el) return;
  el.textContent = ok ? "" : (customMsg || "progress isn't saving right now — your reviews still work, but won't persist");
}

function buildQueue(){
  const today = todayStr();
  const due = [];
  for(const c of CARDS){
    const s = state.cardStates[c.id];
    if(s && s.due <= today) due.push(c);
  }
  due.sort((a,b)=>{
    const da = state.cardStates[a.id], db = state.cardStates[b.id];
    return da.due === db.due ? da.box - db.box : (da.due < db.due ? -1 : 1);
  });

  const remainingNew = sessionExtra ? NEW_CARD_CAP : Math.max(0, NEW_CARD_CAP - state.dailyNew.count);
  const fresh = [];
  for(const c of CARDS){
    if(fresh.length >= remainingNew) break;
    if(!state.cardStates[c.id] && state.activeTags.includes(c.tag)) fresh.push(c);
  }
  return due.concat(fresh);
}

function tagCount(tag){
  return CARDS.filter(c=>c.tag===tag).length;
}

function renderTags(){
  const row = document.getElementById("tagRow");
  row.innerHTML = "";
  TAGS.forEach(tag=>{
    const btn = document.createElement("button");
    btn.className = "tag-chip" + (state.activeTags.includes(tag) ? " active" : "");
    btn.textContent = `${tag} (${tagCount(tag)})`;
    btn.onclick = async ()=>{
      if(state.activeTags.includes(tag)){
        state.activeTags = state.activeTags.filter(t=>t!==tag);
      } else {
        state.activeTags.push(tag);
      }
      await saveState();
      startSession();
    };
    row.appendChild(btn);
  });
}

function renderStats(){
  const today = todayStr();
  let dueCount = 0;
  for(const c of CARDS){
    const s = state.cardStates[c.id];
    if(s && s.due <= today) dueCount++;
  }
  let learned = 0;
  for(const id in state.cardStates) if(state.cardStates[id].box >= 3) learned++;
  document.getElementById("statsRow").innerHTML =
    `<span><b>${dueCount}</b> due</span><span><b>${learned}</b>/${CARDS.length} learned</span>`;
}

function papagoUrl(text){
  return `https://papago.naver.com/?sk=ko&tk=en&st=${encodeURIComponent(text)}`;
}

function showFace(card){
  document.getElementById("frontTag").textContent = card.tag;
  document.getElementById("frontWord").textContent = extractKorean(card.front);
  document.getElementById("backWord").textContent = card.back;
  document.getElementById("papagoLink").href = papagoUrl(extractKorean(card.front));

  const roman = extractRoman(card.front);
  const romanEl = document.getElementById("frontRoman");
  const toggleBtn = document.getElementById("romanToggle");
  romanEl.classList.remove("visible");
  toggleBtn.classList.remove("active");
  toggleBtn.setAttribute("aria-pressed", "false");
  if(roman){
    romanEl.textContent = `(${roman})`;
    toggleBtn.style.display = "";
  } else {
    romanEl.textContent = "";
    toggleBtn.style.display = "none";
  }

  document.getElementById("card").classList.remove("flipped");
  flipped = false;
  document.getElementById("gradeRow").style.visibility = "hidden";
  document.getElementById("tapHint").textContent = "tap the card (or press space) to reveal";
}

function showCardView(show){
  document.getElementById("stage").style.display = show ? "" : "none";
}

function renderCurrent(){
  const empty = document.getElementById("emptyState");
  const done = document.getElementById("doneState");
  empty.style.display = "none";
  done.style.display = "none";
  document.getElementById("tapHint").textContent = "";
  document.getElementById("gradeRow").style.visibility = "hidden";

  if(qIndex >= queue.length){
    showCardView(false);
    const today = todayStr();
    let nextDue = null;
    for(const id in state.cardStates){
      const d = state.cardStates[id].due;
      if(d > today && (nextDue===null || d < nextDue)) nextDue = d;
    }
    if(queue.length === 0 && Object.keys(state.cardStates).length === 0){
      empty.style.display = "block";
      document.getElementById("emptyMsg").textContent = "No cards yet in your active tags — toggle a tag above to start.";
    } else {
      done.style.display = "block";
      document.getElementById("doneMsg").textContent =
        nextDue ? `Next cards come due ${nextDue}. New cards today: ${state.dailyNew.count}/${NEW_CARD_CAP}.`
                : `You're fully caught up. New cards today: ${state.dailyNew.count}/${NEW_CARD_CAP}.`;
    }
    return;
  }
  showCardView(true);
  showFace(queue[qIndex]);
}

async function grade(rating){
  const card = queue[qIndex];
  const existing = state.cardStates[card.id];
  const wasNew = !existing;
  let box = existing ? existing.box : -1;

  if(rating === "again") box = 0;
  else if(rating === "good") box = Math.min(box+1, INTERVALS.length-1);
  else if(rating === "easy") box = Math.min(box+2, INTERVALS.length-1);

  const due = addDays(todayStr(), INTERVALS[box]);
  state.cardStates[card.id] = { box, due };

  if(wasNew && !sessionExtra) state.dailyNew.count += 1;

  await saveState();
  qIndex++;
  renderStats();
  renderCurrent();
}

function flipCard(){
  if(qIndex >= queue.length) return;
  if(document.getElementById("browseView").style.display === "block") return;
  flipped = !flipped;
  document.getElementById("card").classList.toggle("flipped", flipped);
  document.getElementById("gradeRow").style.visibility = flipped ? "visible" : "hidden";
  document.getElementById("tapHint").textContent = flipped ? "" : "tap the card (or press space) to reveal";
}

function renderBrowse(){
  const el = document.getElementById("browseView");
  let html = `<span class="browse-back-link" id="browseBack">← back to practice</span>`;
  TAGS.forEach(tag=>{
    html += `<div class="browse-group-title">${tag} (${tagCount(tag)})</div>`;
    CARDS.filter(c=>c.tag===tag).forEach(c=>{
      html += `<div class="browse-row">
        <div class="browse-line">
          <div class="browse-front">${c.front}</div>
          <div class="row-actions">
            <a class="copy-btn small" target="_blank" rel="noopener noreferrer" href="${papagoUrl(extractKorean(c.front))}" aria-label="Open in Papago translator">🌐</a>
            <button class="copy-btn small browse-copy" data-id="${c.id}" aria-label="copy Korean text">⧉</button>
          </div>
        </div>
        <div class="browse-back">${c.back}</div>
      </div>`;
    });
  });
  el.innerHTML = html;
  document.getElementById("browseBack").addEventListener("click", ()=>{
    el.style.display = "none";
    document.getElementById("mainArea").style.display = "flex";
    document.getElementById("browseLink").style.display = "inline-block";
  });
  el.querySelectorAll(".browse-copy").forEach(btn=>{
    btn.addEventListener("click", (e)=>{
      e.stopPropagation();
      const card = CARDS.find(c=>c.id === btn.dataset.id);
      if(card) copyText(extractKorean(card.front), btn);
    });
  });
}

function bindCardInteractions(){
  document.getElementById("card").addEventListener("click", flipCard);

  document.getElementById("papagoLink").addEventListener("click", (e)=>{
    e.stopPropagation();
  });

  document.getElementById("copyBtn").addEventListener("click", (e)=>{
    e.stopPropagation();
    const card = queue[qIndex];
    if(card) copyText(extractKorean(card.front), e.currentTarget);
  });

  document.getElementById("romanToggle").addEventListener("click", (e)=>{
    e.stopPropagation();
    const romanEl = document.getElementById("frontRoman");
    const showing = romanEl.classList.toggle("visible");
    e.currentTarget.classList.toggle("active", showing);
    e.currentTarget.setAttribute("aria-pressed", showing ? "true" : "false");
  });

  document.querySelectorAll(".grade-btn").forEach(btn=>{
    btn.addEventListener("click", (e)=>{
      e.stopPropagation();
      grade(btn.dataset.grade);
    });
  });

  document.getElementById("moreLink").addEventListener("click", ()=>{
    sessionExtra = true;
    startSession();
  });

  document.getElementById("browseLink").addEventListener("click", ()=>{
    renderBrowse();
    document.getElementById("browseView").style.display = "block";
    document.getElementById("mainArea").style.display = "none";
    document.getElementById("browseLink").style.display = "none";
  });

  const resetLink = document.getElementById("resetLink");
  resetLink.addEventListener("click", async ()=>{
    if(!resetArmed){
      resetArmed = true;
      resetLink.textContent = "tap again to erase all progress";
      resetLink.classList.add("armed");
      resetTimer = setTimeout(()=>{
        resetArmed = false;
        resetLink.textContent = "reset progress";
        resetLink.classList.remove("armed");
      }, 4000);
      return;
    }
    clearTimeout(resetTimer);
    resetArmed = false;
    resetLink.classList.remove("armed");
    resetLink.textContent = "reset progress";
    await storageDelete(STORAGE_KEY);
    state = defaultState();
    sessionExtra = false;
    await saveState();
    startSession();
  });

  document.addEventListener("keydown", (e)=>{
    if(document.getElementById("browseView").style.display === "block") return;
    if(qIndex >= queue.length) return;
    if(e.code === "Space"){ e.preventDefault(); flipCard(); }
    else if(flipped && e.key === "1") grade("again");
    else if(flipped && e.key === "2") grade("good");
    else if(flipped && e.key === "3") grade("easy");
  });
}

function startSession(){
  queue = buildQueue();
  qIndex = 0;
  renderTags();
  renderStats();
  renderCurrent();
  document.getElementById("progressFooter").textContent = `${CARDS.length} cards in deck · stored on this device`;
  document.getElementById("kbdHint").textContent = "space = flip · 1 again · 2 good · 3 easy";
}

(async function init(){
  await loadState();
  bindCardInteractions();
  startSession();
})();
</script>
</body>
</html>
